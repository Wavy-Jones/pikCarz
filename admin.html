<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23FF4545'/><text y='.9em' font-size='70' x='10' fill='white' font-weight='900'>P</text></svg>" />
  <style>
    /* Admin-specific styles */
    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 24px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    
    .admin-header h1 {
      font-size: 2rem;
      color: var(--white);
    }
    
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    
    .stat-card h3 {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
    }
    
    .pending-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    
    .pending-section h2 {
      margin-bottom: 24px;
      color: var(--white);
    }
    
    .pending-vehicle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }
    
    .vehicle-info h4 {
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 8px;
    }
    
    .vehicle-info p {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 4px 0;
    }
    
    .vehicle-info .price {
      font-size: 1.2rem;
      color: var(--accent);
      font-weight: 700;
      margin-top: 8px;
    }
    
    .vehicle-actions {
      display: flex;
      gap: 12px;
    }
    
    .btn-approve {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-approve:hover {
      background: #059669;
    }
    
    .btn-reject {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-reject:hover {
      background: #dc2626;
    }
    
    .login-container {
      max-width: 440px;
      margin: 100px auto;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .login-container h1 {
      text-align: center;
      margin-bottom: 32px;
      color: var(--white);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--white);
      font-size: 1rem;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--muted);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<!-- Login Screen (shown by default) -->
<div id="login-screen">
  <div class="login-container">
    <a href="index.html" class="logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 32px; text-decoration: none;">
      <img src="Logo.png" alt="pikCarz" class="logo-img" style="height: 48px; margin-right: 12px;" />
      <div>
        <div class="logo-text" style="font-size: 1.8rem;">pik<span>Carz</span></div>
        <span class="logo-sub">Admin Login</span>
      </div>
    </a>
    
    <h1>Admin Dashboard</h1>
    
    <div id="login-error" class="error-message" style="display: none;"></div>
    
    <form id="admin-login-form">
      <div class="form-group">
        <label for="admin-email">Email Address</label>
        <input type="email" id="admin-email" required placeholder="admin@pikcarz.co.za" />
      </div>
      
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input type="password" id="admin-password" required placeholder="Enter your password" />
      </div>
      
      <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; margin-top: 8px;">
        Sign In
      </button>
    </form>
    
    <p style="text-align: center; margin-top: 24px; color: var(--muted); font-size: 0.85rem;">
      <a href="index.html" style="color: var(--accent);">← Back to pikCarz</a>
    </p>
  </div>
</div>

<!-- Admin Dashboard (hidden by default) -->
<div id="admin-dashboard" style="display: none;">
  
  <!-- Simple Header -->
  <header style="background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 0;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo" style="text-decoration: none;">
        <img src="Logo.png" alt="pikCarz" class="logo-img" />
        <div>
          <div class="logo-text">pik<span>Carz</span></div>
          <span class="logo-sub">Admin Dashboard</span>
        </div>
      </a>
      <div>
        <span id="admin-name" style="color: var(--muted); margin-right: 16px;"></span>
        <button onclick="adminLogout()" class="btn-ghost">Logout</button>
      </div>
    </div>
  </header>
  
  <div class="admin-container">
    
    <!-- Stats Overview -->
    <div class="admin-header">
      <h1>Platform Overview</h1>
      <button onclick="refreshDashboard()" class="btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
    </div>
    
    <div class="admin-stats">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value" id="stat-users">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Vehicles</h3>
        <div class="value" id="stat-vehicles">0</div>
      </div>
      <div class="stat-card">
        <h3>Active Listings</h3>
        <div class="value" id="stat-active">0</div>
      </div>
      <div class="stat-card">
        <h3>Pending Approval</h3>
        <div class="value" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <h3>Verified Dealers</h3>
        <div class="value" id="stat-dealers">0</div>
      </div>
    </div>
    
    <!-- Pending Vehicles Section -->
    <div class="pending-section">
      <h2>🚦 Pending Vehicles Awaiting Approval</h2>
      <div id="pending-vehicles-list">
        <p style="color: var(--muted);">Loading pending vehicles...</p>
      </div>
    </div>
    
  </div>
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';
  let adminToken = localStorage.getItem('admin_token');
  
  // Check if already logged in
  if (adminToken) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-dashboard').style.display = 'block';
    loadDashboard();
  }
  
  // Handle admin login
  document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;
    const errorDiv = document.getElementById('login-error');
    
    try {
      const response = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      if (!response.ok) {
        throw new Error('Invalid credentials');
      }
      
      const data = await response.json();
      
      // Check if user is admin
      if (data.user.role !== 'admin') {
        throw new Error('Access denied. Admin privileges required.');
      }
      
      // Store token and show dashboard
      adminToken = data.access_token;
      localStorage.setItem('admin_token', adminToken);
      localStorage.setItem('admin_name', data.user.full_name);
      
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'block';
      
      loadDashboard();
      
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
    }
  });
  
  // Load dashboard data
  async function loadDashboard() {
    const adminName = localStorage.getItem('admin_name') || 'Admin';
    document.getElementById('admin-name').textContent = adminName;
    
    await Promise.all([
      loadStats(),
      loadPendingVehicles()
    ]);
  }
  
  // Load platform statistics
  async function loadStats() {
    try {
      const response = await fetch(`${API_BASE}/api/admin/stats`, {
        headers: { 'Authorization': `Bearer ${adminToken}` }
      });
      
      if (!response.ok) throw new Error('Failed to load stats');
      
      const stats = await response.json();
      
      document.getElementById('stat-users').textContent = stats.total_users || 0;
      document.getElementById('stat-vehicles').textContent = stats.total_vehicles || 0;
      document.getElementById('stat-active').textContent = stats.active_vehicles || 0;
      document.getElementById('stat-pending').textContent = stats.pending_vehicles || 0;
      document.getElementById('stat-dealers').textContent = stats.verified_dealers || 0;
      
    } catch (error) {
      console.error('Error loading stats:', error);
    }
  }
  
  // Load pending vehicles
  async function loadPendingVehicles() {
    const listDiv = document.getElementById('pending-vehicles-list');
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/pending?per_page=50`, {
        headers: { 'Authorization': `Bearer ${adminToken}` }
      });
      
      if (!response.ok) throw new Error('Failed to load pending vehicles');
      
      const data = await response.json();
      
      if (data.vehicles.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">No Pending Vehicles</h3>
            <p>All vehicles have been reviewed!</p>
          </div>
        `;
        return;
      }
      
      listDiv.innerHTML = data.vehicles.map(vehicle => `
        <div class="pending-vehicle" id="vehicle-${vehicle.id}">
          <div class="vehicle-info">
            <h4>${vehicle.year} ${vehicle.make} ${vehicle.model}</h4>
            <p><strong>Title:</strong> ${vehicle.title}</p>
            <p><strong>Seller:</strong> ${vehicle.seller_name} (${vehicle.seller_type})</p>
            <p><strong>Location:</strong> ${vehicle.city}, ${vehicle.province}</p>
            <p><strong>Mileage:</strong> ${vehicle.mileage.toLocaleString()} km | <strong>Transmission:</strong> ${vehicle.transmission}</p>
            <p class="price">R ${vehicle.price.toLocaleString()}</p>
          </div>
          <div class="vehicle-actions">
            <button class="btn-approve" onclick="approveVehicle(${vehicle.id})">
              ✓ Approve
            </button>
            <button class="btn-reject" onclick="rejectVehicle(${vehicle.id})">
              ✗ Reject
            </button>
          </div>
        </div>
      `).join('');
      
    } catch (error) {
      console.error('Error loading pending vehicles:', error);
      listDiv.innerHTML = `<p style="color: #ef4444;">Error loading pending vehicles. Please refresh.</p>`;
    }
  }
  
  // Approve vehicle
  async function approveVehicle(vehicleId) {
    if (!confirm('Approve this vehicle listing?')) return;
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/${vehicleId}/approve`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${adminToken}` }
      });
      
      if (!response.ok) throw new Error('Failed to approve vehicle');
      
      // Remove from list
      document.getElementById(`vehicle-${vehicleId}`).remove();
      
      // Refresh stats
      await loadStats();
      
      // Check if list is empty now
      const remaining = document.querySelectorAll('.pending-vehicle').length;
      if (remaining === 0) {
        document.getElementById('pending-vehicles-list').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9 11l3 3L22 4"></path>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">All Done!</h3>
            <p>No more pending vehicles to review.</p>
          </div>
        `;
      }
      
      alert('✅ Vehicle approved successfully!');
      
    } catch (error) {
      alert('Error approving vehicle: ' + error.message);
    }
  }
  
  // Reject vehicle
  async function rejectVehicle(vehicleId) {
    if (!confirm('Reject this vehicle listing? This action cannot be undone.')) return;
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/${vehicleId}/reject`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${adminToken}` }
      });
      
      if (!response.ok) throw new Error('Failed to reject vehicle');
      
      // Remove from list
      document.getElementById(`vehicle-${vehicleId}`).remove();
      
      // Refresh stats
      await loadStats();
      
      // Check if list is empty now
      const remaining = document.querySelectorAll('.pending-vehicle').length;
      if (remaining === 0) {
        document.getElementById('pending-vehicles-list').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9 11l3 3L22 4"></path>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">All Done!</h3>
            <p>No more pending vehicles to review.</p>
          </div>
        `;
      }
      
      alert('✅ Vehicle rejected successfully!');
      
    } catch (error) {
      alert('Error rejecting vehicle: ' + error.message);
    }
  }
  
  // Refresh dashboard
  async function refreshDashboard() {
    await loadDashboard();
    alert('✅ Dashboard refreshed!');
  }
  
  // Logout
  function adminLogout() {
    if (confirm('Logout from admin dashboard?')) {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_name');
      window.location.reload();
    }
  }
</script>

</body>
</html>
