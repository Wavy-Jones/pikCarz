<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .reset-container {
      max-width: 480px;
      margin: 100px auto;
      padding: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .reset-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .reset-logo img {
      height: 48px;
      width: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }
    
    .reset-container h1 {
      text-align: center;
      margin-bottom: 16px;
      color: var(--white);
      font-size: 1.8rem;
    }
    
    .reset-container .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .reset-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    .reset-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    
    .reset-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .reset-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .reset-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .password-requirements {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="reset-container">
  <a href="index.html" class="reset-logo">
    <img src="Logo.png" alt="pikCarz" />
    <span class="logo-sub">Powered by Cubeas</span>
  </a>
  
  <h1>Create New Password</h1>
  <p class="subtitle">Enter your new password below. Make sure it's strong and secure.</p>
  
  <div id="error-message" class="error-message"></div>
  <div id="success-message" class="success-message"></div>
  
  <form id="reset-form">
    <div class="form-group">
      <label for="password">New Password</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        required 
        minlength="6"
        placeholder="Enter new password"
      />
      <div class="password-requirements">
        Minimum 6 characters
      </div>
    </div>
    
    <div class="form-group">
      <label for="confirm-password">Confirm New Password</label>
      <input 
        type="password" 
        id="confirm-password" 
        name="confirm-password" 
        required 
        minlength="6"
        placeholder="Confirm new password"
      />
    </div>
    
    <button type="submit" class="reset-btn" id="reset-btn">
      Reset Password
    </button>
  </form>
  
  <div class="reset-footer">
    <p><a href="signin.html">← Back to Sign In</a></p>
  </div>
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';
  
  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  
  // Check if token exists
  if (!token) {
    document.getElementById('error-message').textContent = 'Invalid reset link. Please request a new password reset.';
    document.getElementById('error-message').style.display = 'block';
    document.getElementById('reset-form').style.display = 'none';
  }
  
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    const submitBtn = document.getElementById('reset-btn');
    
    // Reset messages
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    errorDiv.textContent = '';
    successDiv.textContent = '';
    
    // Validate passwords match
    if (password !== confirmPassword) {
      errorDiv.textContent = 'Passwords do not match';
      errorDiv.style.display = 'block';
      return;
    }
    
    // Validate password length
    if (password.length < 6) {
      errorDiv.textContent = 'Password must be at least 6 characters';
      errorDiv.style.display = 'block';
      return;
    }
    
    // Disable button
    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';
    
    try {
      const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          token: token,
          new_password: password 
        })
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.detail || 'Failed to reset password');
      }
      
      // Show success message
      successDiv.textContent = '✅ ' + data.message;
      successDiv.style.display = 'block';
      
      // Hide form
      document.getElementById('reset-form').style.display = 'none';
      
      // Redirect to signin after 3 seconds
      setTimeout(() => {
        window.location.href = 'signin.html';
      }, 3000);
      
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
</script>

</body>
</html>
