<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .signin-container {
      max-width: 480px;
      margin: 100px auto;
      padding: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }


.signin-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 40px;
}

.signin-logo img {
  height: 48px;
  width: 48px;
  border-radius: 50%;
  border: 2px solid var(--border);
  object-fit: cover;
}

.signin-container h1 {
  text-align: center;
  margin-bottom: 16px;
  color: var(--white);
  font-size: 1.8rem;
}

.error-message {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid #ef4444;
  color: #ef4444;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  display: none;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 500;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-size: 1rem;
}

.signin-btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 8px;
}

.signin-footer {
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
}

.signin-footer a {
  color: var(--accent);
  text-decoration: none;
}


  </style>
</head>
<body>

<div class="signin-container">
  <a href="index.html" class="signin-logo">
    <img src="Logo.png" alt="pikCarz" />
    <span class="logo-sub">Powered by Cubeas</span>
  </a>

  <h1>Create Account</h1>

  <div id="error-message" class="error-message"></div>

  <form id="register-form">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" required placeholder="John Doe" />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="your.email@example.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" required placeholder="Enter password" />
        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Show password">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <small style="display:block;margin-top:6px;color:var(--muted);font-size:0.8rem;">🔒 Use a mix of uppercase, lowercase, numbers &amp; special characters (e.g. <code>P@ssw0rd!</code>) for a strong password.</small>
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirm-password" required placeholder="Confirm password" />
        <button type="button" class="pw-toggle" onclick="togglePw('confirm-password', this)" aria-label="Show password">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="signin-btn" id="register-btn">
      Create Account
    </button>
  </form>

  <div class="signin-footer">
    <p>Already have an account? <a href="signin.html">Sign in</a></p>
  </div>
</div>

<script>
const API_BASE = 'https://pikcarz.vercel.app';

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  btn.innerHTML = isHidden
    ? `<svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const errorDiv = document.getElementById('error-message');
  const btn = document.getElementById('register-btn');

  errorDiv.style.display = 'none';

  if (password !== confirmPassword) {
    errorDiv.textContent = 'Passwords do not match';
    errorDiv.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const response = await fetch(`${API_BASE}/api/auth/register`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ full_name: name, email, password })
    });

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.detail || 'Registration failed');
    }

    // Success
    const data = await response.json();

    // Save token
    localStorage.setItem('auth_token', data.access_token);
    localStorage.setItem('user_data', JSON.stringify(data.user));

    // Redirect to dashboard
    window.location.href = 'dashboard.html';

  } catch (error) {
    errorDiv.textContent = error.message;
    errorDiv.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>

</body>
</html>
