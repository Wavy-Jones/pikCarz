<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .signin-container {
      max-width: 480px;
      margin: 100px auto;
      padding: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .signin-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .signin-logo img {
      height: 48px;
      width: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }
    
    .signin-container h1 {
      text-align: center;
      margin-bottom: 16px;
      color: var(--white);
      font-size: 1.8rem;
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .signin-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    .signin-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    
    .signin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .divider {
      text-align: center;
      color: var(--border);
      margin: 24px 0;
      font-size: 0.9rem;
    }
    
    .signin-footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .signin-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .signin-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="signin-container">
  <a href="index.html" class="signin-logo">
    <img src="Logo.png" alt="pikCarz" />
    <span class="logo-sub">Powered by Cubeas</span>
  </a>
  
  <h1>Welcome Back</h1>
  
  <div id="session-banner" class="error-message" style="background:rgba(245,158,11,0.1);border-color:#f59e0b;color:#f59e0b;display:none">
    ⏰ Your session expired — please sign in again.
  </div>
  <div id="error-message" class="error-message"></div>
  
  <form id="signin-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        required 
        placeholder="your.email@example.com"
        autocomplete="email"
      />
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <button type="button" class="pw-toggle" onclick="togglePw('password', this)" aria-label="Show password">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    
    <button type="submit" class="signin-btn" id="signin-btn">
      Sign In
    </button>
  </form>
  
  <div style="text-align: center; margin-top: 16px;">
    <a href="forgot-password.html" style="color: var(--accent); font-size: 0.9rem;">Forgot your password?</a>
  </div>
  
  <div class="divider">────────</div>
  
  <div class="signin-footer">
    <p>Don't have an account? <a href="register.html">Create one</a></p>
    <p style="margin-top: 16px;"><a href="index.html">← Back to Home</a></p>
  </div>
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';

  // Show session-expired banner if redirected from api.js 401 handler
  if (new URLSearchParams(window.location.search).get('session') === 'expired') {
    document.getElementById('session-banner').style.display = 'block';
  }

  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    btn.innerHTML = isHidden
      ? `<svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M6.53 6.53 17.47 17.47"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }
  
  // Add timeout to fetch to catch hanging requests
  async function fetchWithTimeout(url, options, timeout = 10000) {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);
    
    try {
      const response = await fetch(url, {
        ...options,
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      return response;
    } catch (error) {
      clearTimeout(timeoutId);
      if (error.name === 'AbortError') {
        throw new Error('Request timed out - backend may be slow or unavailable');
      }
      throw error;
    }
  }
  
  document.getElementById('signin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    const submitBtn = document.getElementById('signin-btn');
    
    // Reset error
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';
    
    // Disable button
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
    
    console.log('Attempting login for:', email);
    console.log('API endpoint:', `${API_BASE}/api/auth/login`);
    
    try {
      const response = await fetchWithTimeout(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ email, password }),
        mode: 'cors',
        credentials: 'omit'
      }, 15000); // 15 second timeout
      
      console.log('Response status:', response.status);
      
      if (!response.ok) {
        const error = await response.json();
        console.error('Login error response:', error);
        throw new Error(error.detail || 'Invalid credentials');
      }
      
      const data = await response.json();
      console.log('Login successful:', data.user.email);
      
      // Store token and user data
      localStorage.setItem('auth_token', data.access_token);
      localStorage.setItem('user_data', JSON.stringify(data.user));
      
      // Redirect based on role
      if (data.user.role === 'admin') {
        console.log('Redirecting to admin dashboard');
        window.location.href = 'admin-dashboard.html';
      } else {
        console.log('Redirecting to user dashboard');
        window.location.href = 'dashboard.html';
      }
      
    } catch (error) {
      console.error('Login error:', error);
      
      let errorMessage = error.message;
      
      // Provide more helpful error messages
      if (error.message.includes('Failed to fetch')) {
        errorMessage = 'Unable to connect to server. Please check your internet connection and try again.';
      } else if (error.message.includes('timed out')) {
        errorMessage = 'Connection timed out. The server is taking too long to respond. Please try again.';
      } else if (error.message.includes('NetworkError')) {
        errorMessage = 'Network error. Please check your connection and try again.';
      }
      
      errorDiv.textContent = errorMessage;
      errorDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
  
  // Log when page loads
  console.log('Sign in page loaded');
  console.log('API Base URL:', API_BASE);
</script>

</body>
</html>
