<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .signin-container {
      max-width: 480px;
      margin: 100px auto;
      padding: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .signin-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .signin-logo img {
      height: 48px;
      width: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }
    
    .signin-container h1 {
      text-align: center;
      margin-bottom: 32px;
      color: var(--white);
      font-size: 1.8rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .signin-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    .signin-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    
    .signin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .signin-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .signin-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .divider {
      text-align: center;
      margin: 24px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="signin-container">
  <a href="index.html" class="signin-logo">
    <img src="Logo.png" alt="pikCarz" />
    <span class="logo-sub">Powered by Cubeas</span>
  </a>
  
  <h1>Welcome Back</h1>
  
  <div id="error-message" class="error-message"></div>
  
  <form id="signin-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        required 
        placeholder="your.email@example.com"
        autocomplete="email"
      />
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        required 
        placeholder="Enter your password"
        autocomplete="current-password"
      />
    </div>
    
    <button type="submit" class="signin-btn" id="signin-btn">
      Sign In
    </button>
  </form>
  
  <div style="text-align: center; margin-top: 16px;">
    <a href="forgot-password.html" style="color: var(--accent); font-size: 0.9rem;">Forgot your password?</a>
  </div>
  
  <div class="divider">────────</div>
  
  <div class="signin-footer">
    <p>Don't have an account? <a href="register.html">Create one</a></p>
    <p style="margin-top: 16px;"><a href="index.html">← Back to Home</a></p>
  </div>
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';
  
  document.getElementById('signin-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    const submitBtn = document.getElementById('signin-btn');
    
    // Reset error
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';
    
    // Disable button
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';
    
    try {
      const response = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Invalid credentials');
      }
      
      const data = await response.json();
      
      // Store token and user data
      localStorage.setItem('auth_token', data.access_token);
      localStorage.setItem('user_data', JSON.stringify(data.user));
      
      // Redirect based on role
      if (data.user.role === 'admin') {
        // Admin users go to admin dashboard
        window.location.href = 'admin-dashboard.html';
      } else {
        // Regular users go to user dashboard
        window.location.href = 'dashboard.html';
      }
      
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>

</body>
</html>
