<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — pikCarz</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .reset-container {
      max-width: 480px;
      margin: 100px auto;
      padding: 48px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    
    .reset-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .reset-logo img {
      height: 48px;
      width: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
    }
    
    .reset-container h1 {
      text-align: center;
      margin-bottom: 16px;
      color: var(--white);
      font-size: 1.8rem;
    }
    
    .reset-container .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    
    .reset-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    
    .reset-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
    
    .reset-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .reset-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .reset-footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="reset-container">
  <a href="index.html" class="reset-logo">
    <img src="Logo.png" alt="pikCarz" />
    <span class="logo-sub">Powered by Cubeas</span>
  </a>
  
  <h1>Reset Password</h1>
  <p class="subtitle">Enter your email address and we'll send you instructions to reset your password.</p>
  
  <div id="error-message" class="error-message"></div>
  <div id="success-message" class="success-message"></div>
  
  <form id="reset-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        required 
        placeholder="your.email@example.com"
        autocomplete="email"
      />
    </div>
    
    <button type="submit" class="reset-btn" id="reset-btn">
      Send Reset Instructions
    </button>
  </form>
  
  <div class="reset-footer">
    <p><a href="signin.html">← Back to Sign In</a></p>
  </div>
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';
  
  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const errorDiv = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    const submitBtn = document.getElementById('reset-btn');
    
    // Reset messages
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    errorDiv.textContent = '';
    successDiv.textContent = '';
    
    // Disable button
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    
    try {
      const response = await fetch(`${API_BASE}/api/auth/request-password-reset`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.detail || 'Failed to send reset email');
      }
      
      const data = await response.json();
      
      // Show success message
      successDiv.textContent = '✅ Password reset instructions sent! Check your email.';
      successDiv.style.display = 'block';
      
      // Clear form
      document.getElementById('email').value = '';
      
      // Redirect to signin after 3 seconds
      setTimeout(() => {
        window.location.href = 'signin.html';
      }, 3000);
      
    } catch (error) {
      errorDiv.textContent = error.message;
      errorDiv.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Instructions';
    }
  });
</script>

</body>
</html>
