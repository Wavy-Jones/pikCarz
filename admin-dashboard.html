<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — pikCarz</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23FF4545'/><text y='.9em' font-size='70' x='10' fill='white' font-weight='900'>P</text></svg>" />
  <style>
    /* Admin-specific styles */
    .admin-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 24px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    
    .admin-header h1 {
      font-size: 2rem;
      color: var(--white);
    }
    
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    
    .stat-card h3 {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
    }
    
    .pending-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    
    .pending-section h2 {
      margin-bottom: 24px;
      color: var(--white);
    }
    
    .pending-vehicle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }
    
    .vehicle-info h4 {
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 8px;
    }
    
    .vehicle-info p {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 4px 0;
    }
    
    .vehicle-info .price {
      font-size: 1.2rem;
      color: var(--accent);
      font-weight: 700;
      margin-top: 8px;
    }
    
    .vehicle-actions {
      display: flex;
      gap: 12px;
    }
    
    .btn-approve {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-approve:hover {
      background: #059669;
    }
    
    .btn-reject {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-reject:hover {
      background: #dc2626;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--muted);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <nav class="nav-inner">
    <a href="index.html" class="logo">
      <img src="Logo.png" alt="pikCarz" class="logo-img" />
      <span class="logo-sub">Powered by Cubeas</span>
    </a>
    <div style="display: flex; align-items: center; gap: 16px;">
      <span id="admin-name" style="color: var(--muted);"></span>
      <button onclick="adminLogout()" class="btn-ghost">Logout</button>
    </div>
  </nav>
</header>

<div class="admin-container">
  
  <!-- Stats Overview -->
  <div class="admin-header">
    <h1>Admin Dashboard</h1>
    <button onclick="refreshDashboard()" class="btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
  </div>
  
  <div class="admin-stats">
    <div class="stat-card">
      <h3>Total Users</h3>
      <div class="value" id="stat-users">0</div>
    </div>
    <div class="stat-card">
      <h3>Total Vehicles</h3>
      <div class="value" id="stat-vehicles">0</div>
    </div>
    <div class="stat-card">
      <h3>Active Listings</h3>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <h3>Pending Approval</h3>
      <div class="value" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <h3>Verified Dealers</h3>
      <div class="value" id="stat-dealers">0</div>
    </div>
  </div>
  
  <!-- Pending Vehicles Section -->
  <div class="pending-section">
    <h2>🚦 Pending Vehicles Awaiting Approval</h2>
    <div id="pending-vehicles-list">
      <p style="color: var(--muted);">Loading pending vehicles...</p>
    </div>
  </div>
  
</div>

<script>
  const API_BASE = 'https://pikcarz.vercel.app';
  
  // Check authentication on page load
  const token = localStorage.getItem('auth_token');
  const userData = JSON.parse(localStorage.getItem('user_data') || '{}');
  
  if (!token || userData.role !== 'admin') {
    // Not authenticated or not admin - redirect to signin
    window.location.href = 'signin.html';
  } else {
    // Load dashboard
    loadDashboard();
  }
  
  // Load dashboard data
  async function loadDashboard() {
    document.getElementById('admin-name').textContent = userData.full_name || 'Admin';
    
    await Promise.all([
      loadStats(),
      loadPendingVehicles()
    ]);
  }
  
  // Load platform statistics
  async function loadStats() {
    try {
      const response = await fetch(`${API_BASE}/api/admin/stats`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) throw new Error('Failed to load stats');
      
      const stats = await response.json();
      
      document.getElementById('stat-users').textContent = stats.total_users || 0;
      document.getElementById('stat-vehicles').textContent = stats.total_vehicles || 0;
      document.getElementById('stat-active').textContent = stats.active_vehicles || 0;
      document.getElementById('stat-pending').textContent = stats.pending_vehicles || 0;
      document.getElementById('stat-dealers').textContent = stats.verified_dealers || 0;
      
    } catch (error) {
      console.error('Error loading stats:', error);
    }
  }
  
  // Load pending vehicles
  async function loadPendingVehicles() {
    const listDiv = document.getElementById('pending-vehicles-list');
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/pending?per_page=50`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) throw new Error('Failed to load pending vehicles');
      
      const data = await response.json();
      
      if (data.vehicles.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9 11l3 3L22 4"></path>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">All Clear!</h3>
            <p>No pending vehicles to review.</p>
          </div>
        `;
        return;
      }
      
      listDiv.innerHTML = data.vehicles.map(vehicle => `
        <div class="pending-vehicle" id="vehicle-${vehicle.id}">
          <div class="vehicle-info">
            <h4>${vehicle.year} ${vehicle.make} ${vehicle.model}</h4>
            <p><strong>Title:</strong> ${vehicle.title}</p>
            <p><strong>Seller:</strong> ${vehicle.seller_name} (${vehicle.seller_type})</p>
            <p><strong>Location:</strong> ${vehicle.city}, ${vehicle.province}</p>
            <p><strong>Mileage:</strong> ${vehicle.mileage.toLocaleString()} km | <strong>Transmission:</strong> ${vehicle.transmission}</p>
            <p class="price">R ${vehicle.price.toLocaleString()}</p>
          </div>
          <div class="vehicle-actions">
            <button class="btn-approve" onclick="approveVehicle(${vehicle.id})">
              ✓ Approve
            </button>
            <button class="btn-reject" onclick="rejectVehicle(${vehicle.id})">
              ✗ Reject
            </button>
          </div>
        </div>
      `).join('');
      
    } catch (error) {
      console.error('Error loading pending vehicles:', error);
      listDiv.innerHTML = `<p style="color: #ef4444;">Error loading pending vehicles. Please refresh.</p>`;
    }
  }
  
  // Approve vehicle
  async function approveVehicle(vehicleId) {
    if (!confirm('Approve this vehicle listing?')) return;
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/${vehicleId}/approve`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) throw new Error('Failed to approve vehicle');
      
      document.getElementById(`vehicle-${vehicleId}`).remove();
      await loadStats();
      
      const remaining = document.querySelectorAll('.pending-vehicle').length;
      if (remaining === 0) {
        document.getElementById('pending-vehicles-list').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9 11l3 3L22 4"></path>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">All Done!</h3>
            <p>No more pending vehicles to review.</p>
          </div>
        `;
      }
      
      alert('✅ Vehicle approved successfully!');
      
    } catch (error) {
      alert('Error approving vehicle: ' + error.message);
    }
  }
  
  // Reject vehicle
  async function rejectVehicle(vehicleId) {
    if (!confirm('Reject this vehicle listing? This action cannot be undone.')) return;
    
    try {
      const response = await fetch(`${API_BASE}/api/admin/vehicles/${vehicleId}/reject`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) throw new Error('Failed to reject vehicle');
      
      document.getElementById(`vehicle-${vehicleId}`).remove();
      await loadStats();
      
      const remaining = document.querySelectorAll('.pending-vehicle').length;
      if (remaining === 0) {
        document.getElementById('pending-vehicles-list').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9 11l3 3L22 4"></path>
            </svg>
            <h3 style="color: var(--white); margin-bottom: 8px;">All Done!</h3>
            <p>No more pending vehicles to review.</p>
          </div>
        `;
      }
      
      alert('✅ Vehicle rejected successfully!');
      
    } catch (error) {
      alert('Error rejecting vehicle: ' + error.message);
    }
  }
  
  // Refresh dashboard
  async function refreshDashboard() {
    await loadDashboard();
    alert('✅ Dashboard refreshed!');
  }
  
  // Logout
  function adminLogout() {
    if (confirm('Logout from admin dashboard?')) {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user_data');
      window.location.href = 'signin.html';
    }
  }
</script>

</body>
</html>
